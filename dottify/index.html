<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dottify</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Doto:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #faf9f7;
    --bg2: #f0eeeb;
    --bg3: #e6e4e0;
    --tx: #1a1a18;
    --tx2: #6b6a66;
    --tx3: #9c9b96;
    --acc: #1a1a18;
    --brd: rgba(0,0,0,0.1);
    --mono: 'Doto', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --bg2: #1e1e1c;
      --bg3: #2a2a27;
      --tx: #e8e6df;
      --tx2: #8a8983;
      --tx3: #5c5b57;
      --acc: #e8e6df;
      --brd: rgba(255,255,255,0.08);
    }
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--tx);
    min-height: 100vh;
    padding: 40px 24px;
  }

  .wrap { max-width: 880px; margin: 0 auto; }

  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--tx);
    margin-bottom: 32px;
  }

  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 32px;
  }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
  }

  .preview-area {
    background: var(--bg2);
    border-radius: 6px;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }

  .preview-area svg { width: 80%; height: 80%; }

  .dot-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--tx3);
    text-align: right;
    margin-bottom: 20px;
  }

  .ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .ctrl label {
    font-size: 11px;
    color: var(--tx2);
    min-width: 40px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .ctrl input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 2px;
    background: var(--brd);
    outline: none;
    border-radius: 1px;
  }

  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--acc);
    cursor: pointer;
    border: none;
  }

  .ctrl span {
    font-size: 11px;
    color: var(--tx);
    min-width: 24px;
    text-align: right;
    font-weight: 500;
  }

  .modes {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border: 1px solid var(--brd);
    border-radius: 3px;
    overflow: hidden;
  }

  .modes button {
    flex: 1;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 0;
    background: none;
    border: none;
    border-right: 1px solid var(--brd);
    color: var(--tx3);
    cursor: pointer;
    transition: all 0.15s;
  }

  .modes button:last-child { border-right: none; }
  .modes button:hover { color: var(--tx); }
  .modes button.on { background: var(--acc); color: var(--bg); }

  .right { min-width: 0; }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .section-head span {
    font-size: 12px;
    color: var(--tx3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    flex: 1;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    background: none;
    border: 1px solid var(--brd);
    color: var(--tx2);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .btn:hover { color: var(--tx); border-color: var(--tx3); }

  .code-out {
    background: var(--bg2);
    border-radius: 4px;
    padding: 12px 14px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 11px;
    line-height: 1.5;
    color: var(--tx2);
    max-height: 320px;
    overflow: auto;
    white-space: pre;
    word-break: break-all;
    margin-bottom: 20px;
    border: 1px solid var(--brd);
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>dottify &mdash; svg to dot mono</h1>
  <div class="layout">
    <div class="left">
      <div class="ctrl">
        <label>grid</label>
        <input type="range" min="4" max="16" value="6" step="1" id="grid" oninput="go()">
        <span id="gv">6</span>
      </div>
      <div class="ctrl">
        <label>dot</label>
        <input type="range" min="50" max="100" value="85" step="5" id="ratio" oninput="go()">
        <span id="rv">85%</span>
      </div>
      <div class="modes">
        <button class="on" id="m-outline" onclick="setMode('outline')">outline</button>
        <button id="m-filled" onclick="setMode('filled')">filled</button>
      </div>
      <div class="preview-area">
        <svg id="prev" viewBox="0 0 200 200"></svg>
      </div>
      <div class="dot-count" id="stats"></div>
      <button class="btn" onclick="reload()" style="width:100%;margin-bottom:6px">reload convert.svg</button>
      <button class="btn" onclick="document.getElementById('fp').click()" style="width:100%;margin-bottom:6px">load file&hellip;</button>
      <input type="file" id="fp" accept=".svg,image/svg+xml" style="display:none" onchange="loadFile(event)">
      <button class="btn" id="target-btn" onclick="pickTarget()" style="width:100%;margin-bottom:6px">set target folder</button>
      <div class="ctrl" style="margin-top:12px">
        <label>name</label>
        <input type="text" id="compName" value="MyIcon" placeholder="ComponentName" style="flex:1;font-family:var(--mono);font-size:11px;background:var(--bg2);border:1px solid var(--brd);color:var(--tx);padding:4px 8px;border-radius:3px">
      </div>
    </div>
    <div class="right">
      <div class="section-head">
        <span>svg output</span>
        <button class="btn" onclick="cp('out')">copy svg</button>
        <button class="btn" onclick="save()">save</button>
      </div>
      <div class="code-out" id="out"></div>

      <div class="section-head">
        <span>react component</span>
        <button class="btn" onclick="cp('react-out')">copy react</button>
      </div>
      <div class="code-out" id="react-out"></div>

      <div class="section-head" style="margin-top:24px">
        <span>size preview</span>
      </div>
      <div id="size-preview" style="display:flex;align-items:center;gap:24px;flex-wrap:wrap;padding:16px 0">
        <!-- populated by JS -->
      </div>
    </div>
  </div>
</div>

<canvas id="hc" width="200" height="200" style="display:none"></canvas>

<script src="dottify.js"></script>
<script>
let mode = 'outline';
let svgText = '';
let loadedName = 'convert.svg';
let targetDirHandle = null;
let lastDots = [];   // dots from the most recent render
let lastDotR = 0;
let centerIdx = -1;  // index into lastDots of the user-picked centre, or -1

function setMode(m) {
  mode = m;
  document.getElementById('m-outline').classList.toggle('on', m === 'outline');
  document.getElementById('m-filled').classList.toggle('on', m === 'filled');
  go();
}

async function reload() {
  if (location.protocol === 'file:') {
    document.getElementById('stats').textContent = 'file:// — use "load file..." button';
    return;
  }
  try {
    const r = await fetch('convert.svg?t=' + Date.now());
    if (!r.ok) throw new Error('http ' + r.status);
    svgText = await r.text();
    go();
  } catch (e) {
    document.getElementById('stats').textContent = 'failed to load convert.svg';
  }
}

function loadFile(e) {
  const f = e.target.files && e.target.files[0];
  if (!f) return;
  loadedName = f.name;
  centerIdx = -1; // reset picked centre on new file
  const r = new FileReader();
  r.onload = () => { svgText = r.result; go(); };
  r.readAsText(f);
}

async function pickTarget() {
  if (!window.showDirectoryPicker) {
    alert('Directory picker not supported here (needs http/https, not file://). Save will fall back to download.');
    return;
  }
  try {
    targetDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    const btn = document.getElementById('target-btn');
    btn.textContent = '→ ' + targetDirHandle.name;
  } catch (e) { /* cancelled */ }
}

function dottedName() {
  const base = loadedName.replace(/\.svg$/i, '').replace(/-dotted$/i, '');
  return `${base}-dotted.svg`;
}

function go() {
  if (!svgText) return;

  const grid = parseInt(document.getElementById('grid').value);
  const ratio = parseInt(document.getElementById('ratio').value);
  const dotR = Dottify.dotRadius(grid, ratio);
  const compName = document.getElementById('compName').value || 'MyIcon';

  document.getElementById('gv').textContent = grid;
  document.getElementById('rv').textContent = ratio + '%';

  // ── Filled mode: pattern fill ──
  if (mode === 'filled') {
    const svgOut = Dottify.emitPatternFilled(svgText, grid, dotR);

    const prev = document.getElementById('prev');
    const vbMatch = svgOut.match(/viewBox="([^"]+)"/);
    prev.setAttribute('viewBox', vbMatch ? vbMatch[1] : '0 0 24 24');
    const inner = svgOut.replace(/^<svg[^>]*>/, '').replace(/<\/svg>\s*$/, '');
    prev.innerHTML = inner;

    document.getElementById('out').textContent = svgOut;

    const vb = vbMatch ? vbMatch[1] : '0 0 24 24';
    const reactOut = Dottify.emitReactComponent(inner, vb, compName);
    document.getElementById('react-out').textContent = reactOut;

    // Size preview for filled mode
    const sizePrevF = document.getElementById('size-preview');
    const sizesF = ['0.75rem', '1rem', '1.5rem', '2rem', '3rem'];
    const fillVb = vbMatch ? vbMatch[1] : '0 0 24 24';
    sizePrevF.innerHTML = sizesF.map(s =>
      `<div style="text-align:center">` +
      `<svg viewBox="${fillVb}" xmlns="http://www.w3.org/2000/svg" ` +
      `style="height:${s};width:${s};fill:var(--tx)">${inner}</svg>` +
      `<div style="font-size:10px;color:var(--tx3);margin-top:4px">${s}</div>` +
      `</div>`
    ).join('');

    document.getElementById('stats').textContent = 'pattern fill · grid ' + grid;
    lastDots = [];
    return;
  }

  // ── Outline mode: rasterise + sample ──
  const c = document.getElementById('hc');
  const ctx = c.getContext('2d');

  // Outline mode rasterises as filled then erodes to boundary dots
  const styled = Dottify.styleInject(svgText, 'filled');
  const blob = new Blob([styled], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = () => {
    const MAX = 200;
    const iw = img.width || 24;
    const ih = img.height || 24;
    const s = MAX / Math.max(iw, ih);
    const W = Math.round(iw * s);
    const H = Math.round(ih * s);
    c.width = W;
    c.height = H;
    ctx.clearRect(0, 0, W, H);
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);

    const rgba = ctx.getImageData(0, 0, W, H).data;
    const allDots = Dottify.sampleDots(rgba, W, H, grid, dotR);
    // Outline mode: rasterise as filled, keep only boundary dots —
    // those with at least one empty cardinal neighbour on the grid.
    const solidSet = new Set();
    for (const [x, y, s] of allDots) {
      if (s > 0.5) solidSet.add(`${x},${y}`);
    }
    const dots = allDots.filter(([x, y, s]) => {
      // Partial coverage dots are always edge dots — keep them
      if (s <= 0.5) return true;
      // Full dot: keep only if at least one cardinal neighbour is empty
      return !solidSet.has(`${x},${y - grid}`) ||
             !solidSet.has(`${x},${y + grid}`) ||
             !solidSet.has(`${x - grid},${y}`) ||
             !solidSet.has(`${x + grid},${y}`);
    });

    lastDots = dots;
    lastDotR = dotR;
    if (centerIdx >= dots.length) centerIdx = -1;

    // Tight-crop the viewBox
    let vbX = 0, vbY = 0, vbW = W, vbH = H;
    if (dots.length) {
      const xs = dots.map(d => d[0]);
      const ys = dots.map(d => d[1]);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const pad = dotR + 1;
      if (centerIdx >= 0) {
        const [cx, cy] = dots[centerIdx];
        const rx = Math.max(cx - minX, maxX - cx) + pad;
        const ry = Math.max(cy - minY, maxY - cy) + pad;
        vbX = +(cx - rx).toFixed(1);
        vbY = +(cy - ry).toFixed(1);
        vbW = +(rx * 2).toFixed(1);
        vbH = +(ry * 2).toFixed(1);
      } else {
        vbX = +(minX - pad).toFixed(1);
        vbY = +(minY - pad).toFixed(1);
        vbW = +(maxX - minX + pad * 2).toFixed(1);
        vbH = +(maxY - minY + pad * 2).toFixed(1);
      }
    }

    const circlesStr = dots.map(([x, y, s]) => {
      const r = +(dotR * (s || 1)).toFixed(1);
      return `  <circle cx="${x}" cy="${y}" r="${r}" fill="currentColor"/>`;
    }).join('\n');
    const svgOut = `<svg viewBox="${vbX} ${vbY} ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg">\n${circlesStr}\n</svg>`;

    const prev = document.getElementById('prev');
    prev.setAttribute('viewBox', `0 0 ${W} ${H}`);
    prev.innerHTML = dots
      .map(([x, y, s], i) => {
        const r = +(dotR * (s || 1)).toFixed(1);
        return `<circle cx="${x}" cy="${y}" r="${r}" fill="${i === centerIdx ? '#ff5577' : '#ffff00'}" data-i="${i}"/>`;
      })
      .join('');
    document.getElementById('out').textContent = svgOut;

    // React output
    const reactInner = dots.map(([x, y, s]) => {
      const r = +(dotR * (s || 1)).toFixed(1);
      return `    <circle cx="${x}" cy="${y}" r="${r}" />`;
    }).join('\n');
    const reactOut = Dottify.emitReactComponent(reactInner + '\n', `${vbX} ${vbY} ${vbW} ${vbH}`, compName);
    document.getElementById('react-out').textContent = reactOut;

    // Size preview — render at typical UI sizes
    const sizePrev = document.getElementById('size-preview');
    const sizes = ['0.75rem', '1rem', '1.5rem', '2rem', '3rem'];
    sizePrev.innerHTML = sizes.map(s =>
      `<div style="text-align:center">` +
      `<svg viewBox="${vbX} ${vbY} ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" ` +
      `style="height:${s};width:${s};fill:var(--tx)">${circlesStr}</svg>` +
      `<div style="font-size:10px;color:var(--tx3);margin-top:4px">${s}</div>` +
      `</div>`
    ).join('') +
    `<div style="text-align:center">` +
    `<span style="font-size:1rem;color:var(--tx)">Hello ` +
    `<svg viewBox="${vbX} ${vbY} ${vbW} ${vbH}" xmlns="http://www.w3.org/2000/svg" ` +
    `style="height:1em;width:1em;fill:var(--tx);vertical-align:-0.125em;display:inline-block">${circlesStr}</svg>` +
    ` world</span>` +
    `<div style="font-size:10px;color:var(--tx3);margin-top:4px">inline</div>` +
    `</div>`;

    document.getElementById('stats').textContent =
      `${dots.length} dots · ${W}×${H}` + (centerIdx >= 0 ? ' · centre set' : ' · click a dot to set centre');
  };
  img.onerror = () => {
    URL.revokeObjectURL(url);
    document.getElementById('stats').textContent = 'svg failed to rasterise';
  };
  img.src = url;
}

function cp(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const el = event.target;
    const orig = el.textContent;
    el.textContent = 'copied';
    setTimeout(() => el.textContent = orig, 1500);
  });
}

async function save() {
  const text = document.getElementById('out').textContent;
  if (!text) return;
  const name = dottedName();

  // If a target folder is set, write directly (overwriting existing file).
  if (targetDirHandle) {
    try {
      const fh = await targetDirHandle.getFileHandle(name, { create: true });
      const w = await fh.createWritable();
      await w.write(text);
      await w.close();
      document.getElementById('stats').textContent = `saved → ${targetDirHandle.name}/${name}`;
      return;
    } catch (e) {
      document.getElementById('stats').textContent = 'save failed: ' + e.message;
      return;
    }
  }

  // Fallback: browser download with the named file.
  const blob = new Blob([text], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

// Click a dot in the preview to set it as the centre. Click again to unset.
document.getElementById('prev').addEventListener('click', (e) => {
  if (!lastDots.length) return;
  const svg = e.currentTarget;
  const pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const { x, y } = pt.matrixTransform(svg.getScreenCTM().inverse());
  // find nearest dot
  let best = -1, bestD = Infinity;
  lastDots.forEach(([dx, dy], i) => {
    const d = (dx - x) ** 2 + (dy - y) ** 2;
    if (d < bestD) { bestD = d; best = i; }
  });
  // require click to be within ~2x the dot radius
  if (Math.sqrt(bestD) > lastDotR * 3) return;
  centerIdx = (centerIdx === best) ? -1 : best;
  go();
});

reload();
</script>
</body>
</html>
