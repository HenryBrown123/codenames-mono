name: Deploy to Hetzner

# Trigger on push to main branch
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Check out the repo so we have access to the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js on the GitHub runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build shared package first, then frontend
      - name: Build frontend
        run: |
          npm run build --workspace=shared
          npx --workspace=frontend vite build

      # Set up the SSH key so we can connect to the server
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # Sync code to the server (only changed files, fast)
      - name: Deploy to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env.production' \
            --exclude='certbot' \
            --exclude='dottify' \
            --exclude='.DS_Store' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/codenames-mono/

      # Rebuild and restart containers on the server
      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /opt/codenames-mono/infra
            docker compose -f docker-compose.prod.yml --env-file ../.env.production up --build -d
          EOF
