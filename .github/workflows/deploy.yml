name: Deploy to Hetzner

# Trigger on push to master branch
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Check out the repo so we have access to the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js on the GitHub runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build shared package first, then frontend
      - name: Build frontend
        run: |
          npm run build --workspace=shared
          npx --workspace=frontend vite build

      # Set up the SSH key so we can connect to the server
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      # Sync code to the server (only changed files, fast)
      - name: Deploy to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env.production' \
            --exclude='infra/certbot' \
            --exclude='dottify' \
            --exclude='.DS_Store' \
            --exclude='infra/terraform' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/codenames-mono/

      # Generate SSL certs if they don't exist (first deploy on a fresh server)
      # Certbot needs port 80 free, so stop nginx first if it's running
      # After first run, certs persist on the server and this step is skipped
      - name: Ensure SSL certs exist
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            CERT_DIR="/opt/codenames-mono/infra/certbot/conf/live/codenames.hbprojects.app"
            if [ ! -d "$CERT_DIR" ]; then
              echo "No SSL certs found — generating with Certbot..."

              # Stop nginx if running so certbot can use port 80
              cd /opt/codenames-mono/infra
              docker compose -f docker-compose.prod.yml stop nginx 2>/dev/null || true

              # Create certbot directory if it doesn't exist
              mkdir -p /opt/codenames-mono/infra/certbot/conf

              # Run certbot standalone to get certs
              docker run --rm -p 80:80 \
                -v /opt/codenames-mono/infra/certbot/conf:/etc/letsencrypt \
                certbot/certbot certonly \
                --standalone \
                --non-interactive \
                -d codenames.hbprojects.app \
                --agree-tos \
                -m henry.e.brown@icloud.com

              echo "SSL certs generated successfully"
            else
              echo "SSL certs already exist — skipping"
            fi
          EOF

      # Rebuild and restart containers on the server
      - name: Restart services
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /opt/codenames-mono/infra
            docker compose -f docker-compose.prod.yml --env-file ../.env.production up --build -d
          EOF
